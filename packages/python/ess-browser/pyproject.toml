[project]
name = "ess-browser"
version = "0.1.0"
description = "Shared Playwright browser session with SSO handling"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "playwright>=1.40.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = ["**/test_*.py"]

[tool.hatch.build.targets.wheel]
packages = ["src/ess_browser"]
