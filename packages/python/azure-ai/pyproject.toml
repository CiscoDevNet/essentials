[project]
name = "azure-ai"
version = "0.1.0"
description = "Azure OpenAI GPT-5 deployment with Pulumi"
authors = [{ name = "Matt Norris", email = "matt@mattnorris.dev" }]
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "pulumi>=3.202.0,<4.0.0",
    "pulumi-azure-native>=3.8.0,<4.0.0",
    "pulumi-utils",
]

[tool.uv.sources]
pulumi-utils = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/azure_ai"]
